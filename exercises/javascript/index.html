<!doctype html>
<html>
    <head>
        <title>javascript exercise</title>
        <link rel="stylesheet" href="main.css">

    </head>
    <body>
       <button onclick="change()">Click me...</button>
       <button onclick="glow()">Make Me Glow</button>

       <div class="menu">
            Hello World!
        </div>

        <div class="gear"></div>
            
       

       <script>
        var menu = document.querySelector(".menu");
        var gear = document.querySelector(".gear");


        function change() {
            console.log('it works!');
            /* document.querySelector(".menu") */
            menu.classList.toggle("active");
            /* document.querySelector(".gear") */
            gear.classList.toggle("spin");
            document.body.classList.toggle("dark");
        }

        function glow() {
            console.log('it glows!');
            gear.classList.toggle("glow");
            menu.classList.toggle("glow");

        }

        </script>     
    </body>


    </html>
